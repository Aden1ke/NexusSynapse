<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusSynapse - Sign Up</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="signup.css" />
</head>
<body>
    <div class="shell">
        <!-- SIGNUP FORM -->
        <div class="signup-container">
            <div class="signup-brand">
                <div class="brand-mark">NS</div>
                <div>
                    <div class="brand-name">NexusSynapse</div>
                    <div class="brand-sub">Sign Up</div>
                </div>
            </div>

            <form class="signup-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required />
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required />
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required />
                </div>
                <button type="submit" class="btn btn-signup">Sign Up</button>
            </form>
        </div>
    </div>

    <!-- Script -->
    <script src="signup.js"></script>
</body>
</html>
