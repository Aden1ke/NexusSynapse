<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NexusSynapse — Login</title>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Syne:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <!-- Styles -->
        <link rel="stylesheet" href="login.css" />
    </head>
    <body>
        <div class="shell">
            <!-- LOGIN FORM -->
            <div class="login-container">
                <div class="login-brand">
                    <div class="brand-mark">NS</div>
                    <div>
                        <div class="brand-name">NexusSynapse</div>
                        <div class="brand-sub">Login</div>
                    </div>
                </div>

                <form class="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required />
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required />
                    </div>
                    <button type="submit" class="btn btn-login">Login</button>
                </form>
            </div>
        </div>

        <!-- Script -->
        <script src="login.js"></script>
    </body>
</html>
